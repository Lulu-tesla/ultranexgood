<section class="contacto-section-white">
  <div class="contacto-container">

    <div class="contacto-grid">

      <div class="contacto-info-side">
        <h6 class="contacto-tag">ATENCIÓN INMEDIATA</h6>
        <h2 class="contacto-title-algerian">ESTAMOS PARA <span class="text-red">AYUDARTE</span></h2>
        <p class="contacto-description">
          ¿Tienes dudas sobre tu envío o quieres una cotización personalizada?
          Nuestro equipo técnico está listo para asistirte en todo momento.
        </p>

        <div class="info-cards-stack">
          <div class="info-card">
            <div class="info-icon-box"><i class="fa-solid fa-phone-volume"></i></div>
            <div class="info-text-box">
              <span>LLÁMANOS</span>
              <p>+591 70000000</p>
            </div>
          </div>

          <div class="info-card">
            <div class="info-icon-box"><i class="fa-solid fa-envelope-open-text"></i></div>
            <div class="info-text-box">
              <span>ESCRÍBENOS</span>
              <p>contacto@ultranex.com</p>
            </div>
          </div>

          <div class="info-card">
            <div class="info-icon-box"><i class="fa-solid fa-location-dot"></i></div>
            <div class="info-text-box">
              <span>OFICINA CENTRAL</span>
              <p>Tarija, Bolivia</p>
            </div>
          </div>
        </div>
      </div>

      <div class="contacto-form-side">
        <div class="form-wrapper">
          <div class="form-header">
            <h4>ENVÍANOS UN MENSAJE</h4>
          </div>
          <form class="ultra-form">
            <div class="input-group">
              <input type="text" placeholder="Tu Nombre Completo" class="form-input">
            </div>
            <div class="input-group">
              <input type="email" placeholder="Correo Electrónico" class="form-input">
            </div>
            <div class="input-group">
              <input type="text" placeholder="Asunto del Mensaje" class="form-input">
            </div>
            <div class="input-group">
              <textarea placeholder="¿En qué podemos ayudarte?" class="form-textarea"></textarea>
            </div>

            <button type="submit" class="btn-send-ultra">
              ENVIAR MENSAJE <i class="fa-solid fa-paper-plane"></i>
            </button>
          </form>
        </div>
      </div>

    </div>
  </div>
</section>
